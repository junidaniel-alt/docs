<!doctype html>
<html
  lang="pt-BR"
  data-composition-variables='[
    {"id":"name","type":"string","label":"Nome","default":"Juni Daniel"},
    {"id":"hello","type":"string","label":"Saudação","default":"OLÁ 👋"},
    {"id":"subtitle","type":"string","label":"Subtítulo","default":"prazer em te mostrar"},
    {"id":"tagline","type":"string","label":"Tagline","default":"Explorando IA & criação de vídeo"},
    {"id":"kw1","type":"string","label":"Palavra 1","default":"IA"},
    {"id":"kw2","type":"string","label":"Palavra 2","default":"Vídeo"},
    {"id":"kw3","type":"string","label":"Palavra 3","default":"Inovação"},
    {"id":"footer","type":"string","label":"Rodapé","default":"feito com HyperFrames"}
  ]'
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1080" />
    <script src="../gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1080px;
        height: 1080px;
        overflow: hidden;
        background: #0d0a1a;
        font-family: "Poppins", "Inter", "Helvetica Neue", Arial, sans-serif;
      }

      .bg {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          #ff6b6b 0%,
          #ffd93d 22%,
          #6bcb77 45%,
          #4d96ff 68%,
          #c264fe 88%,
          #ff6b6b 100%
        );
        background-size: 300% 300%;
        background-position: 0% 50%;
      }
      .vignette {
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at 50% 45%,
          rgba(0, 0, 0, 0) 35%,
          rgba(0, 0, 0, 0.4) 100%
        );
        pointer-events: none;
      }

      .scene {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 90px 80px;
        gap: 24px;
      }

      .kicker {
        font-size: 36px;
        font-weight: 600;
        letter-spacing: 14px;
        color: #ffffff;
        text-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      }
      .name {
        font-size: 140px;
        font-weight: 800;
        line-height: 0.95;
        color: #ffffff;
        letter-spacing: -2px;
        text-shadow: 0 12px 50px rgba(0, 0, 0, 0.45);
      }
      .sub {
        font-size: 42px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.92);
        text-shadow: 0 4px 18px rgba(0, 0, 0, 0.4);
      }

      .tagline {
        font-size: 84px;
        font-weight: 700;
        line-height: 1.12;
        max-width: 880px;
        color: #ffffff;
        text-shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
      }

      .chips {
        display: flex;
        gap: 28px;
        flex-wrap: wrap;
        justify-content: center;
        max-width: 920px;
      }
      .chip {
        font-size: 58px;
        font-weight: 700;
        color: #ffffff;
        padding: 24px 48px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.16);
        border: 2px solid rgba(255, 255, 255, 0.55);
        text-shadow: 0 4px 18px rgba(0, 0, 0, 0.4);
      }
      .footer {
        margin-top: 28px;
        font-size: 38px;
        font-weight: 500;
        letter-spacing: 4px;
        color: rgba(255, 255, 255, 0.9);
        text-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="15"
      data-width="1080"
      data-height="1080"
    >
      <div class="bg" id="bg"></div>
      <div class="vignette"></div>

      <div class="scene" id="s1">
        <div class="kicker" id="s1-hello"></div>
        <div class="name" id="s1-name"></div>
        <div class="sub" id="s1-sub"></div>
      </div>

      <div class="scene" id="s2">
        <div class="tagline" id="s2-tag"></div>
      </div>

      <div class="scene" id="s3">
        <div class="chips">
          <div class="chip" id="s3-k1"></div>
          <div class="chip" id="s3-k2"></div>
          <div class="chip" id="s3-k3"></div>
        </div>
        <div class="footer" id="s3-footer"></div>
      </div>
    </div>

    <script>
      const { name, hello, subtitle, tagline, kw1, kw2, kw3, footer } =
        window.__hyperframes.getVariables();
      document.getElementById("s1-hello").textContent = hello;
      document.getElementById("s1-name").textContent = name;
      document.getElementById("s1-sub").textContent = subtitle;
      document.getElementById("s2-tag").textContent = tagline;
      document.getElementById("s3-k1").textContent = kw1;
      document.getElementById("s3-k2").textContent = kw2;
      document.getElementById("s3-k3").textContent = kw3;
      document.getElementById("s3-footer").textContent = footer;

      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.to("#bg", { backgroundPosition: "100% 50%", duration: 15, ease: "none" }, 0);

      tl.set("#s2", { opacity: 0 }, 0);
      tl.set("#s3", { opacity: 0 }, 0);

      tl.from("#s1-hello", { y: -40, opacity: 0, duration: 0.7, ease: "power3.out" }, 0.3);
      tl.from("#s1-name", { y: 90, opacity: 0, scale: 0.85, duration: 1.0, ease: "expo.out" }, 0.5);
      tl.from("#s1-sub", { y: 40, opacity: 0, duration: 0.7, ease: "power2.out" }, 0.9);

      tl.to("#s1", { opacity: 0, duration: 0.7, ease: "power2.inOut" }, 4.6);
      tl.set("#s2", { opacity: 1 }, 4.9);
      tl.from("#s2-tag", { y: 60, opacity: 0, scale: 0.92, duration: 0.9, ease: "power4.out" }, 4.9);

      tl.to("#s2", { opacity: 0, duration: 0.7, ease: "power2.inOut" }, 9.6);
      tl.set("#s3", { opacity: 1 }, 9.9);
      tl.from("#s3-k1", { y: 50, opacity: 0, scale: 0.8, duration: 0.6, ease: "back.out(1.6)" }, 10.0);
      tl.from("#s3-k2", { y: 50, opacity: 0, scale: 0.8, duration: 0.6, ease: "back.out(1.6)" }, 10.18);
      tl.from("#s3-k3", { y: 50, opacity: 0, scale: 0.8, duration: 0.6, ease: "back.out(1.6)" }, 10.36);
      tl.from("#s3-footer", { y: 30, opacity: 0, duration: 0.7, ease: "power2.out" }, 10.7);

      tl.to("#s3", { opacity: 0, duration: 0.8, ease: "power2.in" }, 14.1);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
